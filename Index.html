    let currentStep = 0;
    let isStudyMode = true;
    let score = 0;
    let answered = false;
    let currentSoalObj = null;
    
    // State untuk menyembunyikan MATERI (Default: Tampil)
    let isStudyHidden = false;

    function toggleStudyContent() {
        isStudyHidden = !isStudyHidden;
        applyStudyVisibility();
    }

    function applyStudyVisibility() {
        const content = document.getElementById('study-content');
        const btn = document.getElementById('study-toggle-btn');
        if (isStudyHidden) {
            content.style.display = 'none';
            btn.innerText = 'Tampilkan Materi';
        } else {
            content.style.display = 'block';
            btn.innerText = 'Sembunyikan Materi';
        }
    }

    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    function initStep() {
        isStudyMode = true;
        answered = false;
        document.getElementById('study-screen').style.display = 'block';
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('ex-box').style.display = 'none'; // Sembunyikan box pembahasan soal lama
        document.getElementById('next-btn').style.visibility = 'hidden';

        const data = bankSoal[currentStep % bankSoal.length];
        document.getElementById('study-title').innerText = `Materi: ${data.materi}`;
        document.getElementById('study-content').innerText = data.penjelasan;
        document.getElementById('pos-info').innerText = `Nomor ${currentStep + 1} / 40`;
        
        currentSoalObj = data.soal[Math.floor(Math.random() * data.soal.length)];
        
        // Terapkan preferensi sembunyi materi
        applyStudyVisibility();
    }

    function startQuestion() {
        isStudyMode = false;
        document.getElementById('study-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        
        document.getElementById('q-text').innerText = currentSoalObj.q;
        document.getElementById('lvl-info').innerText = currentSoalObj.lvl;
        
        const options = shuffle([...currentSoalObj.o]);
        const container = document.getElementById('opt-container');
        container.innerHTML = '';
        
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt);
            container.appendChild(btn);
        });
    }

    function checkAnswer(btn, choice) {
        if (answered) return;
        answered = true;
        
        const correct = currentSoalObj.a;
        const allBtns = document.querySelectorAll('.option');
        
        if (choice === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }

        allBtns.forEach(b => b.disabled = true);
        
        // Selalu tampilkan pembahasan soal setelah menjawab
        document.getElementById('ex-text').innerText = currentSoalObj.ex;
        document.getElementById('ex-box').style.display = 'block'; 
        
        document.getElementById('next-btn').style.visibility = 'visible';
    }

    function nextStep() {
        currentStep++;
        if (currentStep < 40) {
            document.getElementById('progress-fill').style.width = `${(currentStep / 40) * 100}%`;
            initStep();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('study-screen').style.display = 'none';
        const res = document.getElementById('result-screen');
        res.style.display = 'block';
        const finalVal = (score / 40) * 100;
        document.getElementById('final-score').innerText = finalVal.toFixed(0);
        
        let comment = "Belajar lagi ya!";
        if(finalVal >= 80) comment = "Luar biasa, Halberg! Kamu siap ujian.";
        else if(finalVal >= 70) comment = "Bagus, sedikit lagi sempurna!";
        document.getElementById('final-comment').innerText = comment;
    }

    initStep();
</script>
